<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background: #fff5f5; overflow-x: hidden; }
        .font-playfair { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .floating { animation: floating 3s ease-in-out infinite; }
        @keyframes floating {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }
        .shimmer {
            background: linear-gradient(90deg, #f8bbd0 0%, #fff 50%, #f8bbd0 100%);
            background-size: 200% 100%;
            animation: shimmer 2s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .sparkle { position: absolute; pointer-events: none; animation: sparkleAnim 1.5s linear forwards; }
        @keyframes sparkleAnim { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center p-4">
    <audio id="bgMusic" loop></audio>
    
    <div id="main-card" class="glass rounded-[3rem] shadow-[0_20px_50px_rgba(0,0,0,0.1)] p-10 max-w-sm w-full text-center space-y-8 transform animate__animated animate__fadeInUp relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-pink-200 rounded-full blur-3xl opacity-30"></div>
        <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-indigo-200 rounded-full blur-3xl opacity-30"></div>
        
        <div id="bday-image-container" class="w-40 h-40 mx-auto rounded-full border-8 border-white overflow-hidden shadow-2xl floating relative z-10">
            <img id="bday-image" src="https://images.unsplash.com/photo-1530103862676-fa8c913a96cd?auto=format&fit=crop&q=80&w=400" alt="Birthday" class="w-full h-full object-cover">
        </div>

        <div class="space-y-4 relative z-10">
            <h1 id="bday-name" class="text-4xl font-playfair shimmer font-bold tracking-tight">Happy Birthday!</h1>
            <p id="bday-message" class="text-slate-600 text-sm leading-relaxed italic">May your day be as wonderful and bright as you are! Wishing you all the happiness in the world.</p>
        </div>

        <div class="bg-white/50 backdrop-blur-sm p-6 rounded-[2rem] border border-white shadow-sm relative z-10 group cursor-pointer active:scale-95 transition-transform" onclick="createSparkles(event)">
            <p id="bday-wish" class="text-pink-600 font-bold text-lg tracking-wide">❤️ Click for a Wish ❤️</p>
            <div id="selected-emoji" class="text-6xl mt-4 inline-block drop-shadow-md">🎂</div>
            <p class="text-[10px] uppercase tracking-widest text-pink-300 mt-2 font-bold opacity-0 group-hover:opacity-100 transition-opacity">Sparkle!</p>
        </div>
    </div>

    <script>
        const SCHEMA = [
            { id: "bday_name", label: "Celebrant Name", type: "text", defaultValue: "Happy Birthday!" },
            { id: "bday_message", label: "Special Message", type: "textarea", defaultValue: "May your day be as wonderful and bright as you are! Wishing you all the happiness in the world." },
            { id: "bday_image", label: "Profile Photo", type: "image", defaultValue: "https://images.unsplash.com/photo-1530103862676-fa8c913a96cd?auto=format&fit=crop&q=80&w=400" },
            { id: "bday_wish", label: "Bottom Wish", type: "text", defaultValue: "❤️ Make a wish! ❤️" },
            { id: "bday_emoji", label: "Celebration Emoji", type: "select", defaultValue: "🎂", options: ["🎂", "🎈", "🎁", "🎉", "🍰", "🍭", "🍦"] },
            { id: "bg_color", label: "Background Color", type: "color", defaultValue: "#fff5f5" },
            { id: "bg_track", label: "Background Music", type: "audio", defaultValue: "https://assets.mixkit.co/active_storage/sfx/123/123.wav" }
        ];

        function createSparkles(e) {
            for(let i=0; i<12; i++) {
                const s = document.createElement('div');
                s.innerHTML = '✨';
                s.className = 'sparkle text-xl';
                s.style.left = (e.pageX + (Math.random() - 0.5) * 100) + 'px';
                s.style.top = (e.pageY + (Math.random() - 0.5) * 100) + 'px';
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 1500);
            }
        }

        function applyUpdate(data) {
            if (!data) return;
            if (data.bday_name) document.getElementById('bday-name').innerText = data.bday_name;
            if (data.bday_message) document.getElementById('bday-message').innerText = data.bday_message;
            if (data.bday_image) document.getElementById('bday-image').src = data.bday_image;
            if (data.bday_wish) document.getElementById('bday-wish').innerText = data.bday_wish;
            if (data.bday_emoji) document.getElementById('selected-emoji').innerText = data.bday_emoji;
            if (data.bg_color) document.body.style.backgroundColor = data.bg_color;
            if (data.bg_track) {
                const audio = document.getElementById('bgMusic');
                if (audio.src !== data.bg_track) {
                    audio.src = data.bg_track;
                    audio.load();
                }
            }
        }

        window.addEventListener('message', e => {
            if (e.data.type === 'UPDATE_DATA') applyUpdate(e.data.payload);
            if (e.data.type === 'REQUEST_SNAPSHOT') window.parent.postMessage({ type: 'HTML_SNAPSHOT', html: document.documentElement.outerHTML }, '*');
        });

        // Initialize Confetti
        for (let i = 0; i < 20; i++) {
            const c = document.createElement('div');
            c.className = 'confetti animate__animated animate__fadeOutDown animate__infinite';
            c.style.position = 'absolute';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.top = Math.random() * 100 + 'vh';
            c.style.width = '8px';
            c.style.height = '8px';
            c.style.opacity = '0.6';
            c.style.pointerEvents = 'none';
            c.style.animationDuration = (Math.random() * 3 + 2) + 's';
            c.style.backgroundColor = ['#f43f5e', '#fbbf24', '#3b82f6', '#10b981'][Math.floor(Math.random() * 4)];
            document.body.appendChild(c);
        }

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('id')) {
            fetch(`/api/card/${urlParams.get('id')}`).then(r => r.json()).then(d => applyUpdate(d));
        }
        window.parent.postMessage({ type: 'REGISTER_MANIFEST', schema: SCHEMA }, '*');
    </script>
</body>
</html>
