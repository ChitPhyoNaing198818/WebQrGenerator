<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My love🤍</title>
    <style>
        :root { --primary: #ff4d6d; --secondary: #c084fc; --gold: linear-gradient(to right, #fbf5b7, #aa771c); --bg: #050505; --ink: #ff758f; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Georgia', serif; overflow: hidden; color: white; }
        .stars { position: fixed; inset: 0; background: radial-gradient(circle at center, #1a0b2e 0%, #000 100%); z-index: -1; }
        #overlay { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 1000; cursor: pointer; transition: 1.5s; text-transform: uppercase; letter-spacing: 4px; color: var(--primary); text-align: center; padding: 20px; }
        #stage-1 { width: 100%; display: flex; justify-content: center; transition: opacity 2s ease; padding: 15px; }
        .content-card { width: 100%; max-width: 310px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border-radius: 30px; padding: 20px 15px; border: 1px solid rgba(255,255,255,0.1); text-align: center; box-shadow: 0 0 50px rgba(0,0,0,1); }
        .images-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px 10px; margin-bottom: 25px; justify-items: center; }
        .image-circle:nth-child(3) { grid-column: span 2; }
        .image-circle { width: 100px; height: 100px; position: relative; opacity: 0; transform: scale(0.5); transition: 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .image-circle img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; border: 3px solid var(--secondary); box-shadow: 0 0 15px var(--secondary); }
        .image-circle.visible { opacity: 1; transform: scale(1); }
        .ribbon { position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #2c1e02; padding: 3px 10px; border-radius: 4px; font-weight: bold; font-size: 0.6rem; white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .meter-container { width: 90%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 15px auto; overflow: hidden; }
        .meter-fill { width: 0%; height: 100%; background: linear-gradient(to right, var(--primary), var(--secondary)); transition: width 4s ease-in-out; }
        .name-tag { font-size: 1.8rem; font-weight: bold; background: linear-gradient(to bottom, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; opacity: 0; transition: 2s; margin-top: 5px; }
        #stage-2 { display: none; flex-direction: column; align-items: center; opacity: 0; transition: 2.5s; position: absolute; width: 100%; padding: 20px; }
        .float-anim { animation: floating 4s ease-in-out infinite; }
        @keyframes floating { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
        #envelope-wrapper { position: relative; width: 280px; height: 180px; background: #f8bbd0; cursor: pointer; box-shadow: 0 15px 45px rgba(0,0,0,0.6); border-radius: 4px; transition: background 1.2s; }
        #envelope-wrapper::before { content: ""; position: absolute; top: 0; left: 0; border-left: 140px solid transparent; border-right: 140px solid transparent; border-top: 90px solid #f06292; z-index: 10; transition: 1s ease; transform-origin: top; }
        #envelope-wrapper.open::before { transform: rotateX(180deg); z-index: 0; }
        #envelope-wrapper.read { background: transparent; box-shadow: none; }
        #letter { position: absolute; top: 10px; left: 10px; width: 260px; height: 160px; background: linear-gradient(135deg, #fff5f7 0%, #fdf5e6 100%); padding: 20px; z-index: 5; transition: 1.8s cubic-bezier(0.4, 0, 0.2, 1); color: var(--ink); border-radius: 15px; }
        #envelope-wrapper.read #letter { transform: translateY(-60px) scale(1.05); height: auto; min-height: 360px; z-index: 20; box-shadow: 0 20px 60px rgba(0,0,0,0.7); width: 90vw; max-width: 300px; left: 50%; margin-left: -150px; }
        #typewriter-text { font-size: 0.85rem; line-height: 1.7; white-space: pre-wrap; font-weight: 500; }
        #stage-3 { display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: 2s; text-align: center; z-index: 100; width: 100%; padding: 20px; }
        .question-box { width: 100%; max-width: 300px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); padding: 30px 15px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .question-text { font-size: 1.2rem; margin-bottom: 25px; color: white; }
        .btn-group { display: flex; gap: 15px; position: relative; justify-content: center; height: 45px; width: 100%; }
        .btn { padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        #yes-btn { background: var(--primary); color: white; }
        #no-btn { background: #eee; color: #666; position: absolute; }
        #hint { margin-top: 30px; color: var(--primary); font-style: italic; animation: pulse-hint 2.5s infinite; text-align: center; }
        @keyframes pulse-hint { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        .heart-float { position: absolute; pointer-events: none; animation: moveUp 6s linear forwards; z-index: 50; }
        @keyframes moveUp { 0% { transform: translateY(0) scale(1); opacity: 0; } 15% { opacity: 0.8; } 100% { transform: translateY(-120vh) scale(1.8); opacity: 0; } }
    </style>
    <script src="/audio-helper.js"></script>
</head>
<body>
    <div id="overlay" onclick="start()">မင်းအတွက် ကိုယ်Supriseတစ်ခုလုပ်ပေးထားတယ် သိချင်ရင်နှိပ်ကြည့်လိုက်နော် </div>
    <div class="stars"></div>
    <div id="stage-1">
        <div class="content-card">
            <div class="images-grid">
                <div class="image-circle" id="c1"><img id="img_1_el" src="https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=400"><div class="ribbon">Your Beauty ✨</div></div>
                <div class="image-circle" id="c2"><img id="img_2_el" src="https://images.unsplash.com/photo-1512916193091-c58b7e24d5d2?w=400"><div class="ribbon">Your Kindness 💖</div></div>
                <div class="image-circle" id="c3"><img id="img_3_el" src="https://images.unsplash.com/photo-1513542789411-b6a5d4f31634?w=400"><div class="ribbon">My Everything 💋</div></div>
            </div>
            <div class="meter-container"><div class="meter-fill" id="bar"></div></div>
            <h1 class="name-tag" id="name">Aye Aye</h1>
        </div>
    </div>
    <div id="stage-2">
        <div id="envelope-wrapper" class="float-anim">
            <div id="letter"><div id="typewriter-text"></div></div>
        </div>
        <div id="hint">ကိုယ့်နှလုံးသားလေးကို ဖွင့်ကြည့်ပါဦး</div>
    </div>
    <div id="stage-3">
        <div class="question-box">
            <p class="question-text" id="q-text">ကို့အချစ်ကို လက်ခံနိုင်မလားဟင်? ❤️</p>
            <div class="btn-group">
                <button class="btn" id="yes-btn" onclick="sayYes()">Yes</button>
                <button class="btn" id="no-btn" onmouseover="moveNo()">No</button>
            </div>
        </div>
    </div>
    <audio id="music" loop><source id="music-src" src=""></audio>
    <button id="music-btn" onclick="toggleMusic(event)" style="display: none;" class="fixed top-6 right-6 z-50 bg-white/80 dark:bg-slate-900/80 border border-slate-200 dark:border-slate-800 p-3 rounded-full shadow-lg hover:scale-110 active:scale-95 transition-all text-sm">🎵</button>
    <script>
        const templateManifest = {
            type: 'REGISTER_MANIFEST',
            schema: [
                { id: 'overlayText', type: 'textarea', label: 'စဖွင့်ချင်း ပေါ်မည့်စာသား', icon: 'fa-solid fa-comment-dots', rows: 2, defaultValue: 'မင်းအတွက် ကိုယ်Supriseတစ်ခုလုပ်ပေးထားတယ် သိချင်ရင်နှိပ်ကြည့်လိုက်နော်' },
                { id: 'nameTag', type: 'text', label: 'ချစ်သူ/Crush ၏ အမည်', icon: 'fa-solid fa-heart', defaultValue: 'Aye Aye' },
                { id: 'ribbon1', type: 'text', label: 'ဓာတ်ပုံ ၁ စာသား (Beauty)', icon: 'fa-solid fa-bookmark', defaultValue: 'Your Beauty ✨' },
                { id: 'ribbon2', type: 'text', label: 'ဓာတ်ပုံ ၁ စာသား (Kindness)', icon: 'fa-solid fa-bookmark', defaultValue: 'Your Kindness 💖' },
                { id: 'ribbon3', type: 'text', label: 'ဓာတ်ပုံ ၁ စာသား (Everything)', icon: 'fa-solid fa-bookmark', defaultValue: 'My Everything 💋' },
                { id: 'letterText', type: 'textarea', label: 'စာအိတ်ထဲက စာသား (Typewriter)', icon: 'fa-solid fa-envelope-open-text', rows: 5, defaultValue: "မင်းကိုသဘောကျနေတာ ခနတာစိတ်လှုပ်ရှားမှုမဟုတ်ဘူး\nအချိန်တွေဘယ်လောက်ကြာကြာ ကို့အတွေးထဲ မင်းကနေရာယူထားတာ\nလူအများကြားထဲရပ်နေရင်းတောင် ကိုယ်ရှာမိတဲ့မျက်လုံးတစ်စုံက မင်းပဲဖြစ်မယ်\nတစ်နေ့နေ့မှာ မင်းဘေးနားရပ်ပြီး ကို့ရဲ့ ရွေးချယ်မှုက မင်းပဲလို့ရိုးရိုးလေးပြောချင်တယ်" },
                { id: 'questionText', type: 'text', label: 'မေးခွန်းစာသား (Stage 3)', icon: 'fa-solid fa-circle-question', defaultValue: 'ကို့အချစ်ကို လက်ခံနိုင်မလားဟင်? ❤️' },
                { id: 'successText', type: 'textarea', label: 'Yes နှိပ်ပြီးရင် ပေါ်မည့်စာသား', icon: 'fa-solid fa-face-smile-wink', rows: 2, defaultValue: 'ကိုလဲ မင်းကိုထာ၀ရချစ်ပါတယ်❤️❤️<br><br>ဒီထက်ပိုပြီး မြတ်နိုးသွားပါဦးမယ်...' },
                { id: 'img1', type: 'image', label: 'ဓာတ်ပုံ ၁', icon: 'fa-solid fa-image', defaultValue: "https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=400" },
                { id: 'img2', type: 'image', label: 'ဓာတ်ပုံ ၁', icon: 'fa-solid fa-image', defaultValue: "https://images.unsplash.com/photo-1512916193091-c58b7e24d5d2?w=400" },
                { id: 'img3', type: 'image', label: 'ဓာတ်ပုံ ၁', icon: 'fa-solid fa-image', defaultValue: "https://images.unsplash.com/photo-1513542789411-b6a5d4f31634?w=400" },
                { id: 'bgMusic', type: 'audio', label: 'နောက်ခံ တေးဂီတ (Music Upload/URL)', icon: 'fa-solid fa-music', defaultValue: '' }
            ]
        };
        window.parent.postMessage(templateManifest, '*');
        let textToType = templateManifest.schema.find(s => s.id === 'letterText').defaultValue;
        let successResponseText = templateManifest.schema.find(s => s.id === 'successText').defaultValue;
        let isStarted = false;

        function toggleMusic(e) {
            if (e) e.stopPropagation();
            const audioEl = document.getElementById('music');
            if (audioEl.paused) {
                audioEl.play().catch(()=>{});
                document.getElementById('music-btn').innerText = '⏸';
            } else {
                audioEl.pause();
                document.getElementById('music-btn').innerText = '🎵';
            }
        }

        function applyStateUpdate(data) {
            if (data.overlayText) document.getElementById('overlay').innerText = data.overlayText;
            if (data.nameTag) document.getElementById('name').innerText = data.nameTag;
            if (data.ribbon1) document.querySelector('#c1 .ribbon').innerText = data.ribbon1;
            if (data.ribbon2) document.querySelector('#c2 .ribbon').innerText = data.ribbon2;
            if (data.ribbon3) document.querySelector('#c3 .ribbon').innerText = data.ribbon3;
            if (data.letterText) textToType = data.letterText;
            if (data.questionText) document.getElementById('q-text').innerText = data.questionText;
            if (data.successText) successResponseText = data.successText;
            if (data.img1) document.getElementById('img_1_el').src = data.img1;
            if (data.img2) document.getElementById('img_2_el').src = data.img2;
            if (data.img3) document.getElementById('img_3_el').src = data.img3;
            if (data.bgMusic) {
                const audio = document.getElementById('music');
                const src = document.getElementById('music-src');
                if (src && src.src !== data.bgMusic) {
                    src.src = data.bgMusic;
                    audio.load();
                }
                if (isStarted) {
                    document.getElementById('music-btn').style.display = 'block';
                }
            } else if (data.bgMusic === "") {
                const audio = document.getElementById('music');
                const src = document.getElementById('music-src');
                if (src) src.src = "";
                document.getElementById('music-btn').style.display = 'none';
                audio.pause();
            }
        }
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'UPDATE_DATA') applyStateUpdate(event.data.payload);
            if (event.data && event.data.type === 'REQUEST_SNAPSHOT') window.parent.postMessage({ type: 'HTML_SNAPSHOT', html: document.documentElement.outerHTML }, '*');
        });
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('id')) {
            fetch(`/api/card/${urlParams.get('id')}`)
                .then(res => res.json())
                .then(data => applyStateUpdate(data))
                .catch(err => console.error("Failed to fetch card data:", err));
        } else if (urlParams.has('studio_payload')) {
          try {
            const base64 = decodeURIComponent(urlParams.get('studio_payload'));
            const binaryString = atob(base64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
            const decodedString = new TextDecoder().decode(bytes);
            const data = JSON.parse(decodedString);
            applyStateUpdate(data);
          } catch(e) { console.error("Payload decoding failed", e); }
        }
        function start() {
            isStarted = true;
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 1500);
            
            const audioEl = document.getElementById('music');
            const src = document.getElementById('music-src');
            if (src && src.src && !src.src.endsWith('.html') && !src.src.endsWith('/') && src.src !== window.location.href) {
                audioEl.play().then(() => {
                    document.getElementById('music-btn').innerText = '⏸';
                    document.getElementById('music-btn').style.display = 'block';
                }).catch(() => {});
            }
            setTimeout(() => document.getElementById('c1').classList.add('visible'), 800);
            setTimeout(() => document.getElementById('c2').classList.add('visible'), 1800);
            setTimeout(() => document.getElementById('c3').classList.add('visible'), 2800);
            setTimeout(() => { document.getElementById('bar').style.width = '100%'; setTimeout(() => { document.getElementById('name').style.opacity = '1'; setTimeout(() => { document.getElementById('stage-1').style.opacity = '0'; setTimeout(() => { document.getElementById('stage-1').style.display = 'none'; document.getElementById('stage-2').style.display = 'flex'; setTimeout(() => document.getElementById('stage-2').style.opacity = '1', 100); }, 2000); }, 4000); }, 2000); }, 3800);
        }
        document.getElementById('envelope-wrapper').addEventListener('click', function() {
            if (!this.classList.contains('open')) {
                this.classList.remove('float-anim'); this.classList.add('open');
                setTimeout(() => { this.classList.add('read'); typeWriter(textToType, document.getElementById('typewriter-text')); }, 1200);
            }
        });
        function typeWriter(text, element) {
            let i = 0; element.textContent = "";
            function type() { if (i < text.length) { element.textContent += text.charAt(i); i++; setTimeout(type, 100); } else { setTimeout(() => { document.getElementById('stage-2').style.opacity = '0'; setTimeout(() => { document.getElementById('stage-2').style.display = 'none'; document.getElementById('stage-3').style.display = 'flex'; setTimeout(() => document.getElementById('stage-3').style.opacity = '1', 100); }, 2000); }, 3000); } }
            type();
        }
        function moveNo() { const noBtn = document.getElementById('no-btn'); noBtn.style.transform = `translate(${Math.random() * 160 - 80}px, ${Math.random() * 80 - 40}px)`; }
        function sayYes() { document.getElementById('q-text').innerHTML = successResponseText; document.getElementById('yes-btn').style.display = 'none'; document.getElementById('no-btn').style.display = 'none'; }
    </script>
    <script src="/surprise-extra.js"></script>
</body>
</html>
